  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script src="assets/js/rom.js" defer></script>

<body>
  
  <nav class="navbar">

  <main class="container details-page">
